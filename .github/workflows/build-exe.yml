name: Build PokeRogueOffline Windows EXE

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Clone PokeRogue fork
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        shell: pwsh
        run: |
          $version = (Get-Content ./pokerogue-src/package.json | ConvertFrom-Json).version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download full unlocks save file
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/pagefaultgames/pokerogue/beta/test/utils/saves/full_unlocks_sanitized.prsv \
            -o pokerogue-src/full_unlocks.prsv

      - name: Apply patches
        shell: bash
        run: bash scripts/apply-patches.sh exe

      - name: Inject build number into banner
        shell: bash
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Electron dependencies
        working-directory: pokerogue-src
        run: pnpm add -D electron electron-builder

      - name: Convert app icon to ICO
        shell: pwsh
        run: |
          magick ${{ github.workspace }}\docs\appIcon.png `
            -define icon:auto-resize=256,128,64,48,32,16 `
            ${{ github.workspace }}\docs\appIcon.ico
          Write-Host "ICO created at ${{ github.workspace }}\docs\appIcon.ico"

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build:app

      - name: Apply post-build patches
        shell: bash
        run: bash scripts/apply-post-build-patches.sh exe

      - name: Copy Electron config files into place
        shell: bash
        run: |
          cp configs/desktop/electron/main.cjs pokerogue-src/main.cjs
          cp configs/desktop/electron/electron-builder.windows.json pokerogue-src/electron-builder.json
          cp docs/appIcon.ico pokerogue-src/appIcon.ico
          cp pokerogue-src/full_unlocks.prsv pokerogue-src/dist/full_unlocks.prsv

      - name: Set electron main in package.json
        working-directory: pokerogue-src
        shell: bash
        run: |
          node -e "
            const pkg = require('./package.json');
            if (!pkg.description) pkg.description = 'PokeRogue Offline';
            if (!pkg.author) pkg.author = 'Scooom';
            pkg.main = 'main.cjs';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Generate Windows EXE
        working-directory: pokerogue-src
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ''
          WIN_CSC_LINK: ''
        run: pnpm electron-builder --win portable --config electron-builder.json

      - name: Rename and save EXE
        id: exe_path
        shell: bash
        run: |
          FILE=$(find -type f -name "PokeRogue*Offline*.exe" | head -n1)
          OUTPUT="./PokeRogueOffline.exe"
          mv "$FILE" "$OUTPUT"
          echo "exe=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Windows
          path: ${{ steps.exe_path.outputs.exe }}
          retention-days: 30
