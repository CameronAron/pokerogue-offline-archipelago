name: Build PokeRogueOffline Windows EXE

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        shell: pwsh
        run: |
          $version = (Get-Content ./pokerogue-src/package.json | ConvertFrom-Json).version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download full unlocks save file
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/pagefaultgames/pokerogue/beta/test/utils/saves/full_unlocks_sanitized.prsv \
            -o pokerogue-src/full_unlocks.prsv

      - name: Apply patches
        shell: bash
        run: bash scripts/apply-patches.sh exe

      - name: Inject build number into the banner
        shell: bash
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Tauri CLI
        working-directory: pokerogue-src
        run: pnpm add -D @tauri-apps/cli

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build:app

      - name: Copy full_unlocks.prsv into dist
        working-directory: pokerogue-src
        shell: bash
        run: cp full_unlocks.prsv dist/full_unlocks.prsv

      - name: Copy Tauri config into place
        working-directory: pokerogue-src
        shell: bash
        run: |
          mkdir -p src-tauri
          cp ${{ github.workspace }}/configs/desktop/tauri/tauri.conf.json src-tauri/tauri.conf.json
          cp ${{ github.workspace }}/configs/desktop/tauri/Cargo.toml src-tauri/Cargo.toml

      - name: Set version in Tauri config
        working-directory: pokerogue-src/src-tauri
        shell: bash
        run: |
          VERSION="${{ steps.pokerogue_version.outputs.version }}"
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}.${BUILD_NUM}\"/" tauri.conf.json

      - name: Build EXE
        working-directory: pokerogue-src
        run: pnpm tauri build --bundles none

      - name: Rename and save EXE
        shell: bash
        run: |
          FILE=$(find pokerogue-src/src-tauri/target/release -maxdepth 1 -name "*.exe" | head -n 1)
          mv "$FILE" ./PokeRogueOffline.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Windows
          path: PokeRogueOffline.exe
          retention-days: 30
