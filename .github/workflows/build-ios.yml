name: Build PokeRogueOffline IPA

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string
      dev:
        description: 'Dev build (dev OAuth client, dev icon/bundle id, -dev naming)'
        required: false
        type: boolean
        default: false
      branch:
        description: 'PokeRogue branch to build from'
        required: false
        type: string
        default: 'main'
      version_override:
        description: 'Override the app version baked into this build (e.g. 1.12.0.0). Lets the installed app report an older version than pagefaultgames/pokerogue currently declares, for testing the update-checker against real existing releases. Leave blank to use whatever upstream currently has.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeRogue fork
        run: git clone --recurse-submodules --depth 1 --branch ${{ inputs.branch || 'main' }} https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            if ! [[ "$VERSION_OVERRIDE" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "ERROR: version_override '$VERSION_OVERRIDE' must look like #.#.#[.#]" >&2
              exit 1
            fi
            node -e "
              const fs = require('fs');
              const pkg = require('./pokerogue-src/package.json');
              pkg.version = process.env.VERSION_OVERRIDE;
              fs.writeFileSync('./pokerogue-src/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          fi
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh mobile

      - name: Inject build number into banner
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          if [ "${{ inputs.dev }}" = "true" ]; then
            sed -i '' "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM} DEV/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts
            sed -i '' "s/Unofficial Offline Client (Scooom)/Unofficial Offline Client (Scooom) Dev/" pokerogue-src/src/ui/handlers/title-ui-handler.ts
          else
            sed -i '' "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts
          fi

      - name: Inject Google iOS Client ID
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            sed -i '' "s/IOS_CLIENT_ID_PLACEHOLDER/856587427302-k9ns6u546mgn6vjv1mcks32mn76u1v01.apps.googleusercontent.com/g" pokerogue-src/src/system/offline/google-drive-backup.ts
          else
            sed -i '' "s/IOS_CLIENT_ID_PLACEHOLDER/856587427302-ejrsdp1qu750amcjupo943593vmeje1k.apps.googleusercontent.com/g" pokerogue-src/src/system/offline/google-drive-backup.ts
          fi

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Capacitor
        working-directory: pokerogue-src
        run: |
          pnpm add @capacitor/core@8.4.1 @capacitor/cli@8.4.1 @capacitor/ios@8.4.1 @capacitor/filesystem@8.1.2 @capacitor/share@8.0.1 @capacitor/status-bar@8.0.2 @capgo/capacitor-social-login@8.3.33

      - name: Configure Capacitor
        working-directory: pokerogue-src
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            cp ${{ github.workspace }}/configs/ios/capacitor/capacitor.config.dev.json capacitor.config.json
          else
            cp ${{ github.workspace }}/configs/ios/capacitor/capacitor.config.json capacitor.config.json
          fi
          cat capacitor.config.json

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Apply post-build patches
        run: bash ${{ github.workspace }}/scripts/apply-post-build-patches.sh mobile

      - name: Add iOS platform
        working-directory: pokerogue-src
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: pokerogue-src
        run: npx cap sync ios

      - name: Wire up Google Sign-In URL handling in AppDelegate
        working-directory: pokerogue-src
        run: python3 ${{ github.workspace }}/scripts/patch-ios-appdelegate.py ios/App/App/AppDelegate.swift

      - name: Set app version
        working-directory: pokerogue-src
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.pokerogue_version.outputs.version }}.${BUILD_NUM}" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.pokerogue_version.outputs.version }}.${BUILD_NUM}" ios/App/App/Info.plist

      - name: Configure iOS app settings
        working-directory: pokerogue-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIHomeIndicatorAutoHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSDocumentsFolderUsageDescription string 'Required to save your exported game data file.'" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" ios/App/App/Info.plist || true

      - name: Register .prsv UTI so iOS preserves the file extension
        working-directory: pokerogue-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:CFBundleTypeName string PokéRogue Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string xyz.scooom.pkr.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSHandlerRank string Owner" ios/App/App/Info.plist

          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeIdentifier string xyz.scooom.pkr.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeDescription string PokéRogue Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:0 string public.data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension:0 string prsv" ios/App/App/Info.plist

      - name: Register Google Sign-In URL scheme
        working-directory: pokerogue-src
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            SCHEME="${{ secrets.GOOGLE_IOS_DEV_REVERSED_CLIENT_ID }}"
          else
            SCHEME="${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}"
          fi
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string ${SCHEME}" ios/App/App/Info.plist

      - name: Copy app icon
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            cp docs/appIcon-dev.png pokerogue-src/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          else
            cp docs/appIcon.png pokerogue-src/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          fi

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild \
            -project pokerogue-src/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "build/App.app" Payload/
          if [ "${{ inputs.dev }}" = "true" ]; then
            IPA_NAME="PokeRogueOffline-dev.ipa"
          else
            IPA_NAME="PokeRogueOffline.ipa"
          fi
          zip -r "$IPA_NAME" Payload
          rm -rf Payload
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      - name: Get IPA size
        id: ipa_size
        run: echo "size=$(wc -c < ${{ env.IPA_NAME }})" >> $GITHUB_OUTPUT

#      - name: Update AltStore source
#        env:
#          APP_VERSION: ${{ steps.pokerogue_version.outputs.version }}
#          BUILD_NUMBER: ${{ github.run_number }}
#          IPA_SIZE: ${{ steps.ipa_size.outputs.size }}
#        run: node scripts/update-altstore-source.js
#
#      - name: Commit updated repo.json
#        run: |
#          git config user.name "github-actions[bot]"
#          git config user.email "github-actions[bot]@users.noreply.github.com"
#          git add docs/repo.json
#          git commit -m "Update AltStore source for v${{ steps.pokerogue_version.outputs.version }}"
#          git push

      - name: Write version artifact
        run: echo -n "${{ steps.pokerogue_version.outputs.version }}" > version.txt

      - name: Upload IPA and version artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-iOS${{ inputs.dev && '-dev' || '' }}
          path: |
            ${{ env.IPA_NAME }}
            version.txt
          retention-days: 30
