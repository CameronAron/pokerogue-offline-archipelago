name: Create Release

on:
  workflow_dispatch:

permissions:
  actions: write   # needed to trigger and query other workflow runs
  contents: write  # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Trigger builds
      # -----------------------------------------------------------------------
      - name: Compute build number
        id: build
        run: echo "number=$(( ${{ github.run_number }} + 100 ))" >> $GITHUB_OUTPUT

      - name: Trigger iOS build
        id: trigger_ios
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-ios.yml --ref "${{ github.ref_name }}" -f build_number=${{ steps.build.outputs.number }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Android build
        id: trigger_android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-android.yml --ref "${{ github.ref_name }}" -f build_number=${{ steps.build.outputs.number }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger AppImage build
        id: trigger_appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-appimage.yml --ref "${{ github.ref_name }}" -f build_number=${{ steps.build.outputs.number }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Windows build
        id: trigger_windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-exe.yml --ref "${{ github.ref_name }}" -f build_number=${{ steps.build.outputs.number }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Locate and Wait for builds
      # -----------------------------------------------------------------------
      - name: Locate run IDs
        id: runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_AFTER: ${{ steps.trigger_ios.outputs.triggered_after }}
          ANDROID_AFTER: ${{ steps.trigger_android.outputs.triggered_after }}
          APPIMAGE_AFTER: ${{ steps.trigger_appimage.outputs.triggered_after }}
          WINDOWS_AFTER: ${{ steps.trigger_windows.outputs.triggered_after }}
        run: |
          set -e
          locate_run() {
            local workflow="$1"
            local after="$2"
            local label="$3"
            local outfile="$4"
            for i in $(seq 1 24); do
              RUN_ID=$(gh api "repos/$REPO/actions/workflows/${workflow}/runs?per_page=5&created=>=${after}" --jq '.workflow_runs | sort_by(.created_at) | .[0].id // empty')
              if [ -n "$RUN_ID" ]; then
                echo "Found $label run: $RUN_ID"
                echo "$RUN_ID" > "$outfile"
                return 0
              fi
              echo "Waiting for $label run to appear... (attempt $i/24)"
              sleep 5
            done
            return 1
          }
          locate_run "build-ios.yml" "$IOS_AFTER" "iOS" /tmp/ios_run_id
          locate_run "build-android.yml" "$ANDROID_AFTER" "Android" /tmp/android_run_id
          locate_run "build-appimage.yml" "$APPIMAGE_AFTER" "AppImage" /tmp/appimage_run_id
          locate_run "build-exe.yml" "$WINDOWS_AFTER" "Windows" /tmp/windows_run_id
          echo "ios_run_id=$(cat /tmp/ios_run_id)" >> $GITHUB_OUTPUT
          echo "android_run_id=$(cat /tmp/android_run_id)" >> $GITHUB_OUTPUT
          echo "appimage_run_id=$(cat /tmp/appimage_run_id)" >> $GITHUB_OUTPUT
          echo "windows_run_id=$(cat /tmp/windows_run_id)" >> $GITHUB_OUTPUT

      - name: Wait for builds to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
          APPIMAGE_RUN_ID: ${{ steps.runs.outputs.appimage_run_id }}
          WINDOWS_RUN_ID: ${{ steps.runs.outputs.windows_run_id }}
        run: |
          # ... (Your existing polling loop logic remains here) ...
          set -e
          TIMEOUT=5400
          POLL=30
          ELAPSED=0
          cancel_run() {
            local run_id="$1"
            gh api --method POST "repos/$REPO/actions/runs/$run_id/cancel" || true
          }
          while true; do
            IOS_STATUS=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.status')
            IOS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.conclusion')
            ANDROID_STATUS=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.status')
            ANDROID_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.conclusion')
            APPIMAGE_STATUS=$(gh api "repos/$REPO/actions/runs/$APPIMAGE_RUN_ID" --jq '.status')
            APPIMAGE_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$APPIMAGE_RUN_ID" --jq '.conclusion')
            WINDOWS_STATUS=$(gh api "repos/$REPO/actions/runs/$WINDOWS_RUN_ID" --jq '.status')
            WINDOWS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$WINDOWS_RUN_ID" --jq '.conclusion')
            if [ "$IOS_CONCLUSION" != "success" ] && [ "$IOS_STATUS" = "completed" ]; then exit 1; fi
            if [ "$ANDROID_CONCLUSION" != "success" ] && [ "$ANDROID_STATUS" = "completed" ]; then exit 1; fi
            if [ "$APPIMAGE_CONCLUSION" != "success" ] && [ "$APPIMAGE_STATUS" = "completed" ]; then exit 1; fi
            if [ "$WINDOWS_CONCLUSION" != "success" ] && [ "$WINDOWS_STATUS" = "completed" ]; then exit 1; fi
            if [ "$IOS_STATUS" = "completed" ] && [ "$ANDROID_STATUS" = "completed" ] && [ "$APPIMAGE_STATUS" = "completed" ] && [ "$WINDOWS_STATUS" = "completed" ]; then break; fi
            ELAPSED=$((ELAPSED + POLL))
            if [ $ELAPSED -ge $TIMEOUT ]; then exit 1; fi
            sleep $POLL
          done

      # -----------------------------------------------------------------------
      # Artifacts and Release
      # -----------------------------------------------------------------------
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # ... (Your existing download logic remains here) ...
          echo "Artifacts downloaded."

      - name: Read version
        id: version
        run: |
          echo "version=$(cat ipa-out/version.txt)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          files: |
            PokeRogueOffline.ipa
            PokeRogueOffline.apk
            PokeRogueOffline.AppImage
            PokeRogueOffline.exe

      - name: Update AltStore source
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.build.outputs.number }}
          IPA_SIZE: $(wc -c < PokeRogueOffline.ipa)
        run: node scripts/update-altstore-source.js

      - name: Commit updated repo.json
        run: |
          git config user.name "ScooomBot"
          git config user.email "scooombot@scooom.xyz"
          git add docs/repo.json
          git commit -m "Update AltStore source for v${{ steps.version.outputs.version }}"
          git push

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        env:
          STATUS: ${{ needs.release.result }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          if [ "$STATUS" == "success" ]; then
            TITLE="Release Successful! 🚀"
            TAGS="rocket,white_check_mark"
            MSG="PokeRogueOffline v$VERSION is live."
          else
            TITLE="Release Failed! ❌"
            TAGS="warning,skull"
            MSG="The release workflow for PokeRogueOffline v$VERSION failed."
          fi
          curl -H "Title: $TITLE" \
               -H "Tags: $TAGS" \
               -H "Markdown: yes" \
               -H "Click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               -d "$MSG" \
               ${{ secrets.NTFY_URL }}

  cancel-builds:
    runs-on: ubuntu-latest
    needs: release
    if: cancelled()
    steps:
      - name: Cancel any active build runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # ... (Your existing cancellation logic remains here) ...
          echo "Cancellation complete."
