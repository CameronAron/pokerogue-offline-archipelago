name: Create Release

on:
  workflow_dispatch:
    inputs:
      dev:
        description: 'Dev run: build all platforms and attach outputs as artifacts on this run instead of publishing a GitHub release'
        required: false
        type: boolean
        default: false
      branch:
        description: 'PokeRogue branch to build from'
        required: false
        type: string
        default: 'main'

permissions:
  actions: write   # needed to trigger and query other workflow runs
  contents: write  # needed to create the GitHub release

jobs:
  release:
    outputs:
      version: ${{ steps.version.outputs.version }} # This exposes the data
      is_release: ${{ steps.gate.outputs.is_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Record a timestamp just before triggering each build, then locate the
      # resulting run ID by finding the first run created after that moment.
      # This avoids any dependency on workflow inputs being queryable via API.
      # -----------------------------------------------------------------------
      - name: Compute build number
        id: build
        run: echo "number=$(( ${{ github.run_number }} + 100 ))" >> $GITHUB_OUTPUT

      - name: Trigger iOS build
        id: trigger_ios
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-ios.yml --ref "${{ github.ref_name }}" \
            -f build_number=${{ steps.build.outputs.number }} \
            -f dev=${{ inputs.dev }} \
            -f branch=${{ inputs.branch || 'main' }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Android build
        id: trigger_android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-android.yml --ref "${{ github.ref_name }}" \
            -f build_number=${{ steps.build.outputs.number }} \
            -f dev=${{ inputs.dev }} \
            -f branch=${{ inputs.branch || 'main' }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger AppImage build
        id: trigger_appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-appimage.yml --ref "${{ github.ref_name }}" \
            -f build_number=${{ steps.build.outputs.number }} \
            -f dev=${{ inputs.dev }} \
            -f branch=${{ inputs.branch || 'main' }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger Windows build
        id: trigger_windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-exe.yml --ref "${{ github.ref_name }}" \
            -f build_number=${{ steps.build.outputs.number }} \
            -f dev=${{ inputs.dev }} \
            -f branch=${{ inputs.branch || 'main' }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT

      - name: Trigger macOS build
        id: trigger_macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run build-macos.yml --ref "${{ github.ref_name }}" \
            -f build_number=${{ steps.build.outputs.number }} \
            -f dev=${{ inputs.dev }} \
            -f branch=${{ inputs.branch || 'main' }}
          echo "triggered_after=$TS" >> $GITHUB_OUTPUT


      # -----------------------------------------------------------------------
      # Locate the run IDs by polling for runs created after the trigger
      # timestamps. Retry for up to 2 minutes to allow GitHub to register them.
      # Run ID is written to a temp file to avoid capturing log lines in $().
      # -----------------------------------------------------------------------
      - name: Locate run IDs
        id: runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_AFTER: ${{ steps.trigger_ios.outputs.triggered_after }}
          ANDROID_AFTER: ${{ steps.trigger_android.outputs.triggered_after }}
          APPIMAGE_AFTER: ${{ steps.trigger_appimage.outputs.triggered_after }}
          WINDOWS_AFTER: ${{ steps.trigger_windows.outputs.triggered_after }}
          MACOS_AFTER: ${{ steps.trigger_macos.outputs.triggered_after }}
        run: |
          set -e

          locate_run() {
            local workflow="$1"
            local after="$2"
            local label="$3"
            local outfile="$4"

            for i in $(seq 1 24); do
              RUN_ID=$(gh api \
                "repos/$REPO/actions/workflows/${workflow}/runs?per_page=5&created=>=${after}" \
                --jq '.workflow_runs | sort_by(.created_at) | .[0].id // empty')
              if [ -n "$RUN_ID" ]; then
                echo "Found $label run: $RUN_ID"
                echo "$RUN_ID" > "$outfile"
                return 0
              fi
              echo "Waiting for $label run to appear... (attempt $i/24)"
              sleep 5
            done

            echo "ERROR: Timed out locating $label run ID."
            return 1
          }

          locate_run "build-ios.yml" "$IOS_AFTER" "iOS" /tmp/ios_run_id
          locate_run "build-android.yml" "$ANDROID_AFTER" "Android" /tmp/android_run_id
          locate_run "build-appimage.yml" "$APPIMAGE_AFTER" "AppImage" /tmp/appimage_run_id
          locate_run "build-exe.yml" "$WINDOWS_AFTER" "Windows" /tmp/windows_run_id
          locate_run "build-macos.yml" "$MACOS_AFTER" "macOS" /tmp/macos_run_id


          IOS_RUN_ID=$(cat /tmp/ios_run_id)
          ANDROID_RUN_ID=$(cat /tmp/android_run_id)
          APPIMAGE_RUN_ID=$(cat /tmp/appimage_run_id)
          WINDOWS_RUN_ID=$(cat /tmp/windows_run_id)
          MACOS_RUN_ID=$(cat /tmp/macos_run_id)


          echo "ios_run_id=$IOS_RUN_ID" >> $GITHUB_OUTPUT
          echo "android_run_id=$ANDROID_RUN_ID" >> $GITHUB_OUTPUT
          echo "appimage_run_id=$APPIMAGE_RUN_ID" >> $GITHUB_OUTPUT
          echo "windows_run_id=$WINDOWS_RUN_ID" >> $GITHUB_OUTPUT
          echo "macos_run_id=$MACOS_RUN_ID" >> $GITHUB_OUTPUT


      # -----------------------------------------------------------------------
      # Poll until all runs reach a terminal state.
      # Timeout after 90 minutes (iOS builds on macos-latest can be slow).
      # If one build fails, the other is cancelled immediately.
      # -----------------------------------------------------------------------
      - name: Wait for builds to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
          APPIMAGE_RUN_ID: ${{ steps.runs.outputs.appimage_run_id }}
          WINDOWS_RUN_ID: ${{ steps.runs.outputs.windows_run_id }}
          MACOS_RUN_ID: ${{ steps.runs.outputs.macos_run_id }}

        run: |
          set -e

          TIMEOUT=5400  # 90 minutes
          POLL=30
          ELAPSED=0

          cancel_run() {
            local run_id="$1"
            local label="$2"
            local status="$3"
            if [ "$status" != "completed" ]; then
              echo "Cancelling $label run $run_id..."
              gh api --method POST "repos/$REPO/actions/runs/$run_id/cancel" || true
            fi
          }

          while true; do
            IOS_STATUS=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.status')
            IOS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID" --jq '.conclusion')
            ANDROID_STATUS=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.status')
            ANDROID_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID" --jq '.conclusion')
            APPIMAGE_STATUS=$(gh api "repos/$REPO/actions/runs/$APPIMAGE_RUN_ID" --jq '.status')
            APPIMAGE_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$APPIMAGE_RUN_ID" --jq '.conclusion')

            WINDOWS_STATUS=$(gh api "repos/$REPO/actions/runs/$WINDOWS_RUN_ID" --jq '.status')
            WINDOWS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$WINDOWS_RUN_ID" --jq '.conclusion')
            MACOS_STATUS=$(gh api "repos/$REPO/actions/runs/$MACOS_RUN_ID" --jq '.status')
            MACOS_CONCLUSION=$(gh api "repos/$REPO/actions/runs/$MACOS_RUN_ID" --jq '.conclusion')

            echo -e "iOS: $IOS_STATUS / $IOS_CONCLUSION | Android: $ANDROID_STATUS / $ANDROID_CONCLUSION | AppImage: $APPIMAGE_STATUS / $APPIMAGE_CONCLUSION | Windows: $WINDOWS_STATUS / $WINDOWS_CONCLUSION | macOS: $MACOS_STATUS / $MACOS_CONCLUSION | (${ELAPSED}s elapsed)"

            # If one has failed, cancel the others and exit immediately
            if [ "$IOS_STATUS" = "completed" ] && [ "$IOS_CONCLUSION" != "success" ]; then
              cancel_run "$ANDROID_RUN_ID" "Android" "$ANDROID_STATUS"
              cancel_run "$WINDOWS_RUN_ID" "Windows" "$WINDOWS_STATUS"
              cancel_run "$APPIMAGE_RUN_ID" "AppImage" "$APPIMAGE_STATUS"
              cancel_run "$MACOS_RUN_ID" "macOS" "$MACOS_STATUS"
              echo "ERROR: iOS build ended with: $IOS_CONCLUSION"
              exit 1
            fi
            if [ "$ANDROID_STATUS" = "completed" ] && [ "$ANDROID_CONCLUSION" != "success" ]; then
              cancel_run "$IOS_RUN_ID" "iOS" "$IOS_STATUS"
              cancel_run "$APPIMAGE_RUN_ID" "AppImage" "$APPIMAGE_STATUS"
              cancel_run "$WINDOWS_RUN_ID" "Windows" "$WINDOWS_STATUS"
              cancel_run "$MACOS_RUN_ID" "macOS" "$MACOS_STATUS"
              echo "ERROR: Android build ended with: $ANDROID_CONCLUSION"
              exit 1
            fi
            
            if [ "$APPIMAGE_STATUS" = "completed" ] && [ "$APPIMAGE_CONCLUSION" != "success" ]; then
              cancel_run "$IOS_RUN_ID" "iOS" "$IOS_STATUS"
              cancel_run "$ANDROID_RUN_ID" "Android" "$APPIMAGE_STATUS"
              cancel_run "$WINDOWS_RUN_ID" "Windows" "$WINDOWS_STATUS"
              cancel_run "$MACOS_RUN_ID" "macOS" "$MACOS_STATUS"
              echo "ERROR: AppImage build ended with: $APPIMAGE_CONCLUSION"
              exit 1
            fi

            if [ "$WINDOWS_STATUS" = "completed" ] && [ "$WINDOWS_CONCLUSION" != "success" ]; then
              cancel_run "$IOS_RUN_ID" "iOS" "$IOS_STATUS"
              cancel_run "$ANDROID_RUN_ID" "Android" "$ANDROID_STATUS"
              cancel_run "$APPIMAGE_RUN_ID" "AppImage" "$APPIMAGE_STATUS"
              cancel_run "$MACOS_RUN_ID" "macOS" "$MACOS_STATUS"
              echo "ERROR: Windows build ended with: $WINDOWS_CONCLUSION"
              exit 1
            fi

            if [ "$MACOS_STATUS" = "completed" ] && [ "$MACOS_CONCLUSION" != "success" ]; then
              cancel_run "$IOS_RUN_ID" "iOS" "$IOS_STATUS"
              cancel_run "$ANDROID_RUN_ID" "Android" "$ANDROID_STATUS"
              cancel_run "$APPIMAGE_RUN_ID" "AppImage" "$APPIMAGE_STATUS"
              cancel_run "$WINDOWS_RUN_ID" "Windows" "$WINDOWS_STATUS"
              echo "ERROR: macOS build ended with: $MACOS_CONCLUSION"
              exit 1
            fi

            if [ "$IOS_STATUS" = "completed" ] && [ "$ANDROID_STATUS" = "completed" ] && [ "$APPIMAGE_STATUS" = "completed" ] && [ "$WINDOWS_STATUS" = "completed" ] && [ "$MACOS_STATUS" = "completed" ]; then
              echo "All builds succeeded."
              break
            fi

            ELAPSED=$((ELAPSED + POLL))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              cancel_run "$IOS_RUN_ID" "iOS" "$IOS_STATUS"
              cancel_run "$ANDROID_RUN_ID" "Android" "$ANDROID_STATUS"
              cancel_run "$APPIMAGE_RUN_ID" "AppImage" "$APPIMAGE_STATUS"
              cancel_run "$WINDOWS_RUN_ID" "Windows" "$WINDOWS_STATUS"
              cancel_run "$MACOS_RUN_ID" "macOS" "$MACOS_STATUS"
              echo "ERROR: Timed out waiting for builds to complete."
              exit 1
            fi
            sleep $POLL
          done

      # -----------------------------------------------------------------------
      # Download all artifacts into the workspace. Artifact names and the
      # filenames inside them carry a "-dev" suffix when inputs.dev is true.
      # -----------------------------------------------------------------------
      - name: Determine release eligibility
        id: gate
        run: |
          if [ "${{ inputs.dev }}" != "true" ] && { [ "${{ inputs.branch }}" = "main" ] || [ -z "${{ inputs.branch }}" ]; }; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Set naming suffix
        id: suffix
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            echo "tag=-dev" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      - name: Download IPA artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          IOS_RUN_ID: ${{ steps.runs.outputs.ios_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$IOS_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-iOS${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > ipa.zip
          unzip ipa.zip -d ipa-out
          mv "ipa-out/PokeRogueOffline${TAG}.ipa" "./PokeRogueOffline${TAG}.ipa"

      - name: Download APK artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ANDROID_RUN_ID: ${{ steps.runs.outputs.android_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$ANDROID_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-Android${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > apk.zip
          unzip apk.zip -d apk-out
          mv "apk-out/PokeRogueOffline${TAG}.apk" "./PokeRogueOffline${TAG}.apk"
          
      - name: Download AppImage artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          APPIMAGE_RUN_ID: ${{ steps.runs.outputs.appimage_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$APPIMAGE_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-AppImage${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > appimage.zip
          unzip appimage.zip -d appimage-out
          mv "appimage-out/PokeRogueOffline${TAG}.AppImage" "./PokeRogueOffline${TAG}.AppImage"
          
      - name: Download Windows EXE artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WINDOWS_RUN_ID: ${{ steps.runs.outputs.windows_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$WINDOWS_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-Windows${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > windows.zip
          unzip windows.zip -d windows-out
          mv "windows-out/PokeRogueOffline${TAG}.exe" "./PokeRogueOffline${TAG}.exe"

      - name: Download macOS x64 DMG artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MACOS_RUN_ID: ${{ steps.runs.outputs.macos_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$MACOS_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-macOS-x64${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > macos-x64.zip
          unzip macos-x64.zip -d macos-x64-out
          mv "macos-x64-out/PokeRogueOffline${TAG}-x64.dmg" "./PokeRogueOffline${TAG}-x64.dmg"

      - name: Download macOS arm64 DMG artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MACOS_RUN_ID: ${{ steps.runs.outputs.macos_run_id }}
          TAG: ${{ steps.suffix.outputs.tag }}
        run: |
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$MACOS_RUN_ID/artifacts" \
            --jq ".artifacts[] | select(.name == \"PokeRogueOffline-macOS-arm64${TAG}\") | .id")
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > macos-arm64.zip
          unzip macos-arm64.zip -d macos-arm64-out
          mv "macos-arm64-out/PokeRogueOffline${TAG}-arm64.dmg" "./PokeRogueOffline${TAG}-arm64.dmg"


      # -----------------------------------------------------------------------
      # Read the version string from version.txt bundled in the iOS artifact.
      # This guarantees the tag matches what's actually in the binaries, rather
      # than fetching live from upstream which could have changed since the build ran.
      # -----------------------------------------------------------------------
      - name: Read version
        id: version
        run: |
          VERSION=$(cat ipa-out/version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found Version: ${VERSION}"

      # -----------------------------------------------------------------------
      # Non-release run (dev=true, or dev=false on a non-main branch): skip
      # the GitHub release and AltStore feed update. Each platform's output
      # is uploaded as its own artifact (not bundled) so downloading e.g.
      # just the iOS build doesn't pull the others along.
      # -----------------------------------------------------------------------
      - name: Upload iOS artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-iOS-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}.ipa
          retention-days: 30

      - name: Upload Android artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Android-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}.apk
          retention-days: 30

      - name: Upload AppImage artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-AppImage-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}.AppImage
          retention-days: 30

      - name: Upload Windows artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Windows-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}.exe
          retention-days: 30

      - name: Upload macOS x64 artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-macOS-x64-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}-x64.dmg
          retention-days: 30

      - name: Upload macOS arm64 artifact
        if: ${{ steps.gate.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-macOS-arm64-v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          path: PokeRogueOffline${{ steps.suffix.outputs.tag }}-arm64.dmg
          retention-days: 30

      # -----------------------------------------------------------------------
      # Publish the combined GitHub release. Only when dev=false AND branch=main.
      # -----------------------------------------------------------------------
      - name: Create Release
        if: ${{ steps.gate.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.build.outputs.number }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          body: |
            ## PokeRogueOffline v${{ steps.version.outputs.version }}

            <!-- changelog:start -->
            <!-- changelog:end -->

            - **PokeRogueOffline.ipa** — iOS (sideload via SideStore / LiveContainer / Feather)
            - **PokeRogueOffline.apk** — Android (sideload by enabling "Install unknown apps")
            - **PokeRogueOffline.AppImage** — Linux AppImage
            - **PokeRogueOffline.exe** — Windows Portable EXE
            - **PokeRogueOffline-x64.dmg** — macOS (Intel)
            - **PokeRogueOffline-arm64.dmg** — macOS (Apple Silicon)

          files: |
            PokeRogueOffline.ipa
            PokeRogueOffline.apk
            PokeRogueOffline.AppImage
            PokeRogueOffline.exe
            PokeRogueOffline-x64.dmg
            PokeRogueOffline-arm64.dmg

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get IPA size
        if: ${{ steps.gate.outputs.is_release == 'true' }}
        id: ipa_size
        run: echo "size=$(wc -c < PokeRogueOffline.ipa)" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # repo.json (the AltStore source) lives permanently on the `seed`
      # branch now — GitHub Pages (pokerogue-offline.github.io) serves from
      # `seed`, and that's the URL baked into shipped builds' AltStore source
      # and repo.json's own iconURL/website fields. `main` no longer carries
      # a copy, so check out `seed` and update its repo.json directly.
      # appIcon.png is also re-copied from `main` in case the icon changed.
      # -----------------------------------------------------------------------
      - name: Checkout seed branch
        if: ${{ steps.gate.outputs.is_release == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: seed
          path: seed-branch

      - name: Update AltStore source on seed branch
        if: ${{ steps.gate.outputs.is_release == 'true' }}
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.build.outputs.number }}
          IPA_SIZE: ${{ steps.ipa_size.outputs.size }}
          REPO_JSON_PATH: seed-branch/docs/repo.json
        run: node scripts/update-altstore-source.js

      - name: Commit AltStore source to seed branch
        if: ${{ steps.gate.outputs.is_release == 'true' }}
        run: |
          cp docs/appIcon.png seed-branch/docs/appIcon.png
          cd seed-branch
          git config user.name "ScooomBot"
          git config user.email "scooombot@scooom.xyz"
          git add docs/repo.json docs/appIcon.png
          git diff --staged --quiet || git commit -m "Update AltStore source for v${{ steps.version.outputs.version }}"
          git push

  # -----------------------------------------------------------------------
  # Runs only if the release job is cancelled. Finds any in-progress or
  # queued runs of the build workflows and cancels them.
  # -----------------------------------------------------------------------
  cancel-builds:
    runs-on: ubuntu-latest
    needs: release
    if: cancelled()
    steps:
      - name: Cancel any active build runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          cancel_active_runs() {
            local workflow="$1"
            local label="$2"

            RUN_IDS=$(gh api "repos/$REPO/actions/workflows/${workflow}/runs?per_page=10" \
              --jq '.workflow_runs[] | select(.status == "in_progress" or .status == "queued") | .id')

            if [ -z "$RUN_IDS" ]; then
              echo "No active $label runs to cancel."
              return
            fi

            for RUN_ID in $RUN_IDS; do
              echo "Cancelling $label run $RUN_ID..."
              gh api --method POST "repos/$REPO/actions/runs/$RUN_ID/cancel" || true
            done
          }

          cancel_active_runs "build-ios.yml" "iOS"
          cancel_active_runs "build-android.yml" "Android"
          cancel_active_runs "build-appimage.yml" "AppImage"
          cancel_active_runs "build-exe.yml" "Windows"
          cancel_active_runs "build-macos.yml" "macOS"


  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        env:
          STATUS: ${{ needs.release.result }}
          VERSION: ${{ needs.release.outputs.version }}
          IS_RELEASE: ${{ needs.release.outputs.is_release }}
        run: |
          if [ "$STATUS" == "success" ] && [ "$IS_RELEASE" == "true" ]; then
            TITLE="Release Successful! 🚀"
            TAGS="rocket,white_check_mark"
            MSG="PokeRogueOffline v$VERSION is live."
          elif [ "$STATUS" == "success" ]; then
            TITLE="Build Artifacts Ready 🧪"
            TAGS="test_tube,white_check_mark"
            MSG="PokeRogueOffline v$VERSION built successfully — outputs are attached as workflow artifacts (no release published)."
          elif [ "$IS_RELEASE" == "true" ]; then
            TITLE="Release Failed! ❌"
            TAGS="warning,skull"
            MSG="The release workflow for PokeRogueOffline v$VERSION failed."
          else
            TITLE="Build Failed! ❌"
            TAGS="warning,skull"
            MSG="The build workflow for PokeRogueOffline v$VERSION failed."
          fi
          curl -H "Title: $TITLE" \
               -H "Tags: $TAGS" \
               -H "Markdown: yes" \
               -H "Click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               -d "$MSG" \
               ${{ secrets.NTFY_URL }}
