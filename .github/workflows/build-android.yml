name: Build PokeRogueOffline APK

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh android

      - name: Inject build number into banner
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Apply post-build patches
        run: bash ${{ github.workspace }}/scripts/apply-post-build-patches.sh android

      - name: Install Capacitor
        working-directory: pokerogue-src
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share @capacitor/status-bar

      - name: Configure Capacitor
        working-directory: pokerogue-src
        run: cp ${{ github.workspace }}/configs/android/capacitor/capacitor.config.json capacitor.config.json

      - name: Add Android platform
        working-directory: pokerogue-src
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: pokerogue-src
        run: npx cap sync android

      - name: Copy static MainActivity
        working-directory: pokerogue-src
        run: |
          DEST=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          cp ${{ github.workspace }}/configs/android/java/MainActivity.java "$DEST"

      - name: Apply fullscreen immersive patch
        working-directory: pokerogue-src
        run: node ${{ github.workspace }}/patches/android/node/fullscreen-immersive.js

      - name: Patch AndroidManifest to prevent keyboard resize
        working-directory: pokerogue-src
        run: node ${{ github.workspace }}/patches/android/node/android-manifest-keyboard-fix.js

      - name: Fix Android permissions
        working-directory: pokerogue-src
        run: |
          # ---- Permissions ----
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "WRITE_EXTERNAL_STORAGE" $MANIFEST || \
            sed -i 's|<application|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <application|' $MANIFEST
          echo "Contents of ${MANIFEST}"
          cat $MANIFEST

      - name: Copy app icon
        run: |
          sudo apt-get update -q
          sudo apt-get install -y imagemagick

          ICON_SRC="${{ github.workspace }}/docs/appIcon.png"
          RES_DIR="pokerogue-src/android/app/src/main/res"

          convert "$ICON_SRC" -resize 48x48   "$RES_DIR/mipmap-mdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 72x72   "$RES_DIR/mipmap-hdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 96x96   "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 144x144 "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"

          convert "$ICON_SRC" -resize 48x48   "$RES_DIR/mipmap-mdpi/ic_launcher_round.png"
          convert "$ICON_SRC" -resize 72x72   "$RES_DIR/mipmap-hdpi/ic_launcher_round.png"
          convert "$ICON_SRC" -resize 96x96   "$RES_DIR/mipmap-xhdpi/ic_launcher_round.png"
          convert "$ICON_SRC" -resize 144x144 "$RES_DIR/mipmap-xxhdpi/ic_launcher_round.png"
          convert "$ICON_SRC" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"

          # Delete the adaptive icon XML directory so Android 8+ uses the
          # plain PNGs instead of the default Capacitor adaptive icon which
          # would otherwise override everything above.
          rm -rf pokerogue-src/android/app/src/main/res/mipmap-anydpi-v26


      - name: Set version in build.gradle
        working-directory: pokerogue-src/android/app
        run: |
          VERSION="${{ steps.pokerogue_version.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          RUN=${{ inputs.build_number || github.run_number }}

          # VERSION_CODE: each component gets a fixed-width slot so codes are
          # always monotonically increasing within a game version.
          #   MAJOR * 10_000_000  (supports 0-9)
          #   MINOR *    100_000  (supports 0-99)
          #   PATCH *      1_000  (supports 0-99)
          #   RUN                 (supports 0-999, rolls over cleanly at 1000)
          # Max realistic value ~100_000_000 — well under Android's 2_100_000_000 limit.
          VERSION_CODE=$(( MAJOR * 10000000 + MINOR * 100000 + PATCH * 1000 + RUN ))
          VERSION_NAME="${VERSION}.${RUN}"

          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" build.gradle

      - name: Make gradlew executable
        working-directory: pokerogue-src/android
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        working-directory: pokerogue-src/android
        run: ./gradlew assembleDebug

      - name: Rename resulting APK
        run: |
          UNSIGNED="pokerogue-src/android/app/build/outputs/apk/debug/app-debug.apk"
          SIGNED="PokeRogueOffline.apk"
          cp -v $UNSIGNED $SIGNED

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Android
          path: PokeRogueOffline.apk
          retention-days: 30
