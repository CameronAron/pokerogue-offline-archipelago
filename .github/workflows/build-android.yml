name: Build PokeRogueOffline APK

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string
      dev:
        description: 'Dev build (dev OAuth config/icon/app id, no Drive backup wiring)'
        required: false
        type: boolean
        default: false
      branch:
        description: 'PokeRogue branch to build from'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch ${{ inputs.branch || 'main' }} https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh android

      - name: Inject build number into banner
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          if [ "${{ inputs.dev }}" = "true" ]; then
            sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM} DEV/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts
          else
            sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts
          fi

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Capacitor
        working-directory: pokerogue-src
        run: |
            pnpm add @capacitor/core@8.3.4 @capacitor/cli@8.3.4 @capacitor/android@8.3.4 @capacitor/filesystem@8.1.2 @capacitor/share@8.0.1 @capacitor/status-bar@8.0.2 @capgo/capacitor-social-login@8.3.33

      - name: Configure Capacitor
        working-directory: pokerogue-src
        run: |
          if [ "${{ inputs.dev }}" = "true" ]; then
            cp ${{ github.workspace }}/configs/android/capacitor/capacitor.config-dev.json capacitor.config.json
          else
            cp ${{ github.workspace }}/configs/android/capacitor/capacitor.config.json capacitor.config.json
          fi

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Apply post-build patches
        run: bash ${{ github.workspace }}/scripts/apply-post-build-patches.sh android

      - name: Add Android platform
        working-directory: pokerogue-src
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: pokerogue-src
        run: npx cap sync android

      - name: Copy static MainActivity
        working-directory: pokerogue-src
        run: |
          DEST=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          if [ "${{ inputs.dev }}" = "true" ]; then
            cp ${{ github.workspace }}/configs/android/java/MainActivity-dev.java "$DEST"
          else
            cp ${{ github.workspace }}/configs/android/java/MainActivity.java "$DEST"
          fi

      - name: Patch AndroidManifest to prevent keyboard resize
        working-directory: pokerogue-src
        run: node ${{ github.workspace }}/patches/android/node/android-manifest-keyboard-fix.js

      - name: Fix Android permissions
        working-directory: pokerogue-src
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "WRITE_EXTERNAL_STORAGE" $MANIFEST || \
            sed -i 's|<application|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <application|' $MANIFEST
          echo "Contents of ${MANIFEST}"
          cat $MANIFEST

      - name: Copy app icon
        run: |
          sudo apt-get update -q
          sudo apt-get install -y imagemagick

          if [ "${{ inputs.dev }}" = "true" ]; then
            ICON_SRC="${{ github.workspace }}/docs/appIcon-dev.png"
          else
            ICON_SRC="${{ github.workspace }}/docs/appIcon.png"
          fi
          ICON_ADAPTIVE="${{ github.workspace }}/docs/appIcon-adaptive.png"
          RES_DIR="pokerogue-src/android/app/src/main/res"

          # Legacy icons
          convert "$ICON_SRC" -resize 48x48   "$RES_DIR/mipmap-mdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 72x72   "$RES_DIR/mipmap-hdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 96x96   "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 144x144 "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON_SRC" -resize 192x192 "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"

          cp "$RES_DIR/mipmap-mdpi/ic_launcher.png"    "$RES_DIR/mipmap-mdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-hdpi/ic_launcher.png"    "$RES_DIR/mipmap-hdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xhdpi/ic_launcher.png"   "$RES_DIR/mipmap-xhdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"  "$RES_DIR/mipmap-xxhdpi/ic_launcher_round.png"
          cp "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png" "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"

          # Foreground layers for adaptive icon (1.5x size)
          convert "$ICON_ADAPTIVE" -resize 72x72   "$RES_DIR/mipmap-mdpi/ic_launcher_foreground.png"
          convert "$ICON_ADAPTIVE" -resize 108x108 "$RES_DIR/mipmap-hdpi/ic_launcher_foreground.png"
          convert "$ICON_ADAPTIVE" -resize 144x144 "$RES_DIR/mipmap-xhdpi/ic_launcher_foreground.png"
          convert "$ICON_ADAPTIVE" -resize 216x216 "$RES_DIR/mipmap-xxhdpi/ic_launcher_foreground.png"
          convert "$ICON_ADAPTIVE" -resize 288x288 "$RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png"

          # Adaptive icon XMLs - same image for both layers for full bleed
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"
          cp ${{ github.workspace }}/configs/android/res/mipmap-anydpi-v26/ic_launcher.xml "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          cp ${{ github.workspace }}/configs/android/res/mipmap-anydpi-v26/ic_launcher_round.xml "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Set version in build.gradle
        working-directory: pokerogue-src/android/app
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          VERSION="${{ steps.pokerogue_version.outputs.version }}"

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          HOTFIX=$(echo "$VERSION" | cut -d. -f4)

          VERSION_CODE=$(( MINOR * 100000000 + PATCH * 1000000 + HOTFIX * 10000 + BUILD_NUM ))
          VERSION_NAME="${VERSION}.${BUILD_NUM}"

          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" build.gradle

      - name: Make gradlew executable
        working-directory: pokerogue-src/android
        run: chmod +x gradlew

      - name: Restore pinned debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build release APK
        working-directory: pokerogue-src/android
        run: ./gradlew assembleDebug

      - name: Rename resulting APK
        run: |
          UNSIGNED="pokerogue-src/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ "${{ inputs.dev }}" = "true" ]; then
            OUTPUT="PokeRogueOffline-dev.apk"
          else
            OUTPUT="PokeRogueOffline.apk"
          fi
          cp -v $UNSIGNED $OUTPUT
          echo "APK_NAME=$OUTPUT" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-Android${{ inputs.dev && '-dev' || '' }}
          path: ${{ env.APK_NAME }}
          retention-days: 30
