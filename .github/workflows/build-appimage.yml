name: Build PokeRogueOffline AppImage

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget

      - name: Clone PokeRogue
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/pagefaultgames/pokerogue.git pokerogue-src

      - name: Get PokeRogue version
        id: pokerogue_version
        run: |
          VERSION=$(node -p "require('./pokerogue-src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh appimage

      - name: Inject build number into the banner
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          sed -i "s/BUILD_NUMBER_PLACEHOLDER/${BUILD_NUM}/g" pokerogue-src/src/ui/handlers/title-ui-handler.ts

      - name: Install PokeRogue dependencies
        working-directory: pokerogue-src
        run: pnpm install

      - name: Install Tauri CLI
        working-directory: pokerogue-src
        run: pnpm add -D @tauri-apps/cli

      - name: Build PokeRogue
        working-directory: pokerogue-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Copy Tauri config into place
        working-directory: pokerogue-src
        run: |
          mkdir -p src-tauri/src src-tauri/capabilities
          cp ${{ github.workspace }}/configs/desktop/tauri/tauri.conf.json src-tauri/tauri.conf.json
          cp ${{ github.workspace }}/configs/desktop/tauri/Cargo.toml src-tauri/Cargo.toml
          cp ${{ github.workspace }}/configs/desktop/tauri/build.rs src-tauri/build.rs
          cp ${{ github.workspace }}/configs/desktop/tauri/main.rs src-tauri/src/main.rs
          cp ${{ github.workspace }}/configs/desktop/tauri/lib.rs src-tauri/src/lib.rs
          cp ${{ github.workspace }}/configs/desktop/tauri/capabilities/localhost.json src-tauri/capabilities/localhost.json

      - name: Generate Tauri icons
        working-directory: pokerogue-src
        run: pnpm tauri icon ${{ github.workspace }}/docs/appIcon.png

      - name: Set version in Tauri config
        working-directory: pokerogue-src/src-tauri
        run: |
          VERSION="${{ steps.pokerogue_version.outputs.version }}"
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          TAURI_VERSION="${MAJOR}.${MINOR}.${PATCH}${BUILD_NUM}"
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${TAURI_VERSION}\"/" tauri.conf.json

      - name: Build AppImage
        working-directory: pokerogue-src
        run: pnpm tauri build --bundles appimage

      - name: Rename and save AppImage
        run: |
          FILE=$(find pokerogue-src/src-tauri/target -name "*.AppImage" | head -n 1)
          mv "$FILE" ./PokeRogueOffline.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogueOffline-AppImage
          path: PokeRogueOffline.AppImage
          retention-days: 30
